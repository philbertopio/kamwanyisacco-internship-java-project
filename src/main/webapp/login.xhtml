<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log In - Kimwanyi SACCO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>
<h:body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-mark">K</div>
            <h1>Welcome back</h1>
            <p class="auth-subtitle">Log in to your Kimwanyi SACCO account</p>

            <h:panelGroup rendered="#{loginPageBean.error}">
                <div class="alert alert-error">Incorrect username or password. Please try again.</div>
            </h:panelGroup>
            <h:panelGroup rendered="#{loginPageBean.loggedOut}">
                <div class="alert alert-info">You have been logged out successfully.</div>
            </h:panelGroup>
            <h:panelGroup rendered="#{loginPageBean.sessionExpired}">
                <div class="alert alert-error">Your session expired. Please log in again.</div>
            </h:panelGroup>

            <!--
                This is a plain HTML form (not h:form) posting straight to
                Spring Security's loginProcessingUrl. Routing login through
                the JSF component lifecycle would fight with the security
                filter chain, so authentication is kept outside JSF entirely.
            -->
            <form action="#{request.contextPath}/j_spring_security_check" method="post">
                <input type="hidden" name="#{requestScope['_csrf'].parameterName}" value="#{requestScope['_csrf'].token}"/>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required="required" autofocus="autofocus"/>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required="required"/>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.xhtml">Register here</a>
            </div>
        </div>
    </div>
</h:body>
</html>
