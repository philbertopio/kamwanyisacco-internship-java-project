<ui:composition template="/WEB-INF/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <ui:define name="title">Repay Loan - Kimwanyi SACCO</ui:define>
    <ui:define name="content">

        <div class="page-header">
            <h1>Repay Your Loan</h1>
            <p>Pay instantly using Mobile Money or Card - no need to visit the office.</p>
        </div>

        <h:panelGroup rendered="#{empty loanRepaymentBean.activeLoans}">
            <div class="card">
                <div class="empty-state">You don't have any active loans to repay right now.</div>
            </div>
        </h:panelGroup>

        <ui:repeat value="#{loanRepaymentBean.activeLoans}" var="loan">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
                    <div>
                        <h3 style="margin-bottom:0.25rem;">Loan #<h:outputText value="#{loan.id}"/></h3>
                        <p style="color:var(--color-text-muted); margin:0;">
                            Outstanding balance: <strong>UGX <h:outputText value="#{loan.outstandingBalance}"><f:convertNumber pattern="#,##0.00"/></h:outputText></strong>
                            &#8226; Due <h:outputText value="#{loan.dueDate}"><f:convertDateTime pattern="dd MMM yyyy"/></h:outputText>
                        </p>
                    </div>
                    <a class="btn btn-accent"
                       href="#{request.contextPath}/member/payment.xhtml?purpose=LOAN_REPAYMENT&amp;targetId=#{loan.id}">
                        Pay Now via Mobile Money / Card
                    </a>
                </div>
            </div>
        </ui:repeat>

    </ui:define>
</ui:composition>
