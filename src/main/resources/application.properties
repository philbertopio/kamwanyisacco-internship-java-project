# Database connection
db.url=${DB_URL}
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}
db.driver=com.mysql.cj.jdbc.Driver

# Hibernate
hibernate.hbm2ddl.auto=update
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
hibernate.show_sql=true

# PesaPal v3 Gateway
pesapal.consumer.key=${PESAPAL_CONSUMER_KEY}
pesapal.consumer.secret=${PESAPAL_CONSUMER_SECRET}
pesapal.base.url=${PESAPAL_BASE_URL}
pesapal.callback.url=${PESAPAL_CALLBACK_URL}
pesapal.ipn.url=${PESAPAL_IPN_URL}

# Payment settings
payment.currency=${PAYMENT_CURRENCY}
payment.business.name=${BUSINESS_NAME}